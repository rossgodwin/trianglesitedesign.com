# Site wide configuration
destination: docs

url: ""
baseurl: ""

title: Triangle Site Design
description: Civil Consulting and Engineering Firm
location: Raleigh, NC

# Analytics
google_analytics_measurement_id:

tsd:
  name: Triangle Site Design
  legal_name: Triangle Site Design, PLLC
  address:
    line1: 4004 Barrett Drive, Suite 101
    citystate: Raleigh, NC
    zip: 27609
  address-url: https://goo.gl/maps/B6HC9R6WakWR4yd99
  phone_number: 919-553-6570
  open:
    days: Monday - Friday
    hours: 8am - 5pm
  linkedin:
