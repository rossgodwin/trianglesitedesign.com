{% include helpers/prepend-baseurl.html path=include.photo-url %}
<div class="tsd-leadership-bio">
	<img class="tsd-leadership-bio-photo tsd-image-responsive" src="{{ __return }}" alt="{{ include.name }}">
	<div>
		<h4>{{ include.name }}{% if include.name_title %}, {{ include.name_title }}{% endif %}</h4>
		{% for accomplishment in include.accomplishments %}
			<h5>{{ accomplishment }}</h5>
		{% endfor %}
		<section style="margin-top: 10px;">
			<a href="{{ include.linkedin }}" style="margin-right: 10px;" target="_blank">
				<i class="fab fa-linkedin fa-2x" data-fa-transform="down-4"></i>
			</a>
			<a href="mailto:{{ include.email }}" target="_blank">
				<i class="fa fa-envelope-square fa-2x" data-fa-transform="down-4"></i>
			</a>
		</section>
		<hr>
		<p>
			{{ include.bio }}
		</p>
	</div>
</div>
