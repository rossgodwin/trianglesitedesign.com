{% assign _reverse = include.reverse | default: false %}
<div class="{% if _reverse == true %}tsd-quote-angled-edges-reverse{% else %}tsd-quote-angled-edges{% endif %}">
	<section class="tsd-page-content-width">
		<p>
			<i class="fas fa-quote-left fa-2x fa-inverse" style="margin-right: 10px;" aria-hidden="true"></i>
			{{ include.quote }}
		</p>
		<h3>{{ include.name }}</h3>
		<h5>{{ include.title }} | {{ include.company }}</h5>
	</section>
</div>
